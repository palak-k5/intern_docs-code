<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login — User Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>


<body>

<div class="app">

  <header class="topbar">

    <div class="topbar-brand">
      <span class="brand-name">User Portal</span>
    </div>

    <nav class="nav">
      <a href="login.html" class="nav-link active">
        Login
      </a>
      <a href="signup.html" class="nav-link">
        Sign Up
      </a>
      <a href="users.html" class="nav-link">
        Users
      </a>
    </nav>
  </header>

  <main class="auth">

  <div class="auth-left">
    <h1>Welcome Back</h1>
    <p>Login to access your account and manage users.</p>

    <ul class="info-list">
      <li>Secure user authentication</li>
      <li>Manage registered members</li>
      <li>View user table</li>
    </ul>
  </div>

  <div class="auth-right">

    <div class="box">

      <h2>Login</h2>

      <form class="form">

        <div class="field">
          <label class="label">Email</label>
          <input type="email" class="input">
        </div>

        <div class="field">
          <label class="label">Password</label>
          <input type="password" class="input">
        </div>

        <button class="btn">Sign In</button>

      </form>

    </div>

  </div>

</main>

</div>

</body>
</html>
